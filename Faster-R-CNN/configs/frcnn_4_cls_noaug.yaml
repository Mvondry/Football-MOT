experiment_name: FRCNN-4-cls-noaug

model:
  num_classes: 5
  pretrained: true

data:
  gt_filename: gt_4_cls.txt
  class_names:
    - background
    - player
    - goalkeeper
    - ball
    - referee

splits:
  train: splits/train.txt
  val: splits/val.txt
  test: splits/test.txt

training:
  epochs: 20
  batch_size: 4
  learning_rate: 0.005
  momentum: 0.9
  weight_decay: 0.0005
  lr_step_size: 10
  lr_gamma: 0.1
  num_workers: 4

augmentation:
  enabled: false
  random_zoom_out: 0.0
  random_photometric_distort: 0.0
  random_horizontal_flip: 0.0

evaluation:
  score_threshold: 0.5
  iou_threshold: 0.5